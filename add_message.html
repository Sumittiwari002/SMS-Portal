<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="SMS-portal.css">
</head>
<body>
    <div class="navbar-custom">
    <a href="#">SMS Portal</a>
    <a href="add_library.html">Add Library</a>
    <a href="add_group.html">Add Group</a>
    <a href="add_message.html">Add Message</a>
    <a href="add_contact.html">Add Contact</a>
    <a href="index.html" id="home">Home Page</a>
</div>
    <ul>
        <h1>Add Message</h1>
        <select id="libraryInfo" class="form-control">
    <option value="">Select Library</option>
</select> <br/><br/>
<div class="mb-4">
    <textarea id="txt1" 
    class="form-control" 
    placeholder="Write Messagel Here...."></textarea>
</div>

<div class="text-center">
    <button id="btn" class="neon-btn">Add Message</button>
</div>

    </ul>
    <p id="message"></p>
<script src="function.js" type="module"></script>
    <script type="module">

        import{fetchDataOption, element, get, set, setValue, getValue, parse, stringify, setMessage, empty, lower} from './function.js';

        fetchDataOption(getValue('libName'), "#libraryInfo")

        element('#btn').onclick = function(){
            let txtValue1 = lower(get('#txt1'));

            let libraryInfo = lower(get('#libraryInfo'));

            // console.log(txtValue1);
            // console.log(empty[txtValue1]);

            if(empty([txtValue1, libraryInfo])){
                setMessage("#message", "Values Require");
            }
            else{
                let messageInfo = getValue('messageDetails');
                console.log(messageInfo);

                let infoObj = {
                    "content": txtValue1,
                    "libName": libraryInfo
                }
                // console.log(infoObj);
                

                if(messageInfo === null){
                    let arr = [];
                    arr.push(infoObj);
                    let result = stringify(arr);
                    setValue('messageDetails', result);
                    setMessage('#message', "Lib Message Added");
                    set('#txt1','')
                    set('#libraryInfo','')
                }
                else{
                    let groupInfo = parse(messageInfo);
                    groupInfo.push(infoObj);
                    let result = stringify(groupInfo);
                    console.log(result);

                    setValue('messageDetails', result);
                    setMessage("#message", "Lib Message Updated");
                    set('#txt1', '')
                    set('#libraryInfo', '');
                    
                }
                
            }
            
        }
        document.getElementById('home').addEventListener('click', function(){
            window.location.href= 'SMS-portalshow.html';
        });
        

    </script>
    
    
</body>
</html>
