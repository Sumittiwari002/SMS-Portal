<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Library</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="SMS-portal.css">

</head>
<body>

<div class="navbar-custom mb-4 text-center">
        <a href="index.html">SMS Portal</a>
        <a href="add_library.html">Add Library</a>
        <a href="add_group.html">Add Group</a>
        <a href="add_message.html">Add Message</a>
        <a href="add_contact.html">Add Contact</a>
        <a href="index.html" id="home">Home Page</a>
    </div>
    <div class="container mt-5">

<div class="contact-card">

    <h2>📚 Add Group</h2>

    <div class="mb-4">
        <input
        type="text"
        id="txt"
        class="form-control"
        placeholder="Enter Group Name">
    </div>

    <button id="btn" class="neon-btn">
        ➕ Add Group
    </button>

    <p id="message" class="text-center mt-3"></p>

</div>
</div>
<script src="function.js" type="module"></script>
<script type="module">
import { getValue, lower, empty, setValue, setMessage, get, set, stringify, element, parse} from "./function.js";

element('#btn').onclick = function(){
    let txtValue = lower(get('#txt'));
    console.log(txtValue);
    console.log(empty[txtValue]);

    if(empty([txtValue])){
        setMessage("#message", "Group Name Require");
    }
    else{
        let grpname = getValue('grpname');
        if(grpname===null){
            let arr = stringify([txtValue]);
            // console.log(arr);
            setValue('grpname', arr);
            setMessage("#message", "Group Added....");
            set('#txt','')
            
        }
        else{
            // console.log(libName);
            grpname = parse(grpname);
            // console.log(libName);
            // console.log(txtValue);

            if(!grpname.includes(txtValue)){
                grpname.push(txtValue);
                let result = stringify(grpname);
                setValue('grpname', result);
                setMessage("#message", "Group Updated....");
                set("#txt",'');
            }
            else{
                setMessage("#message", "Group Exists");
                set('#txt','');
            }     
        }
    }       
}

document.getElementById('home').addEventListener('click', function(){
            window.location.href= 'SMS-portalshow.html';
        });

</script>

</body>
</html>
