<div class="glass-card">

    <h2>📚 Add Library</h2>

    <div class="mb-4">
        <input
        type="text"
        id="txt"
        class="form-control"
        placeholder="Enter Library Name">
    </div>

    <button id="btn" class="neon-btn">
        ➕ Add Library
    </button>

    <p id="message"></p>

</div>
<script src="function.js" type="module"></script>
<script type="module">
import { getValue, lower, empty, setValue, setMessage, get, set, stringify, element, parse} from "./function.js";

element('#btn').onclick = function(){
    let txtValue = lower(get('#txt'));
    console.log(txtValue);
    console.log(empty[txtValue]);

    if(empty([txtValue])){
        setMessage("#message", "Library Name Require");
    }
    else{
        let libName = getValue('libName');
        if(libName===null){
            let arr = stringify([txtValue]);
            // console.log(arr);
            setValue('libName', arr);
            setMessage("#message", "Library Name Added");
            set('#txt','')
            
        }
        else{
            // console.log(libName);
            libName = parse(libName);
            // console.log(libName);
            // console.log(txtValue);

            if(!libName.includes(txtValue)){
                libName.push(txtValue);
                let result = stringify(libName);
                setValue('libName', result);
                setMessage("#message", "Library Updated");
                set("#txt",'');
            }
            else{
                setMessage("#message", "Library Exists");
                set('#txt','');
            }     
        }
    }       
}
